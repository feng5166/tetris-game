<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超级俄罗斯方块</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-wrapper">
    <h1 class="title">超级俄罗斯方块</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>
      <div class="side-panel">
        <div class="panel-section">
          <div class="panel-label">下一个</div>
          <canvas id="next" width="120" height="120"></canvas>
        </div>
        <div class="panel-section">
          <div class="panel-label">得分</div>
          <div class="panel-value" id="score">0</div>
        </div>
        <div class="panel-section">
          <div class="panel-label">等级</div>
          <div class="panel-value" id="level">1</div>
        </div>
        <div class="panel-section">
          <div class="panel-label">行数</div>
          <div class="panel-value" id="lines">0</div>
        </div>
        <div class="controls">
          <div class="controls-title">操作说明</div>
          <div class="control-item"><span class="key">←→</span> 移动</div>
          <div class="control-item"><span class="key">↑</span> 旋转</div>
          <div class="control-item"><span class="key">↓</span> 加速</div>
          <div class="control-item"><span class="key">空格</span> 直接落底</div>
          <div class="control-item"><span class="key">P</span> 暂停</div>
        </div>
        <button class="btn" id="startBtn">开始游戏</button>
      </div>
    </div>
  </div>
  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <div class="overlay-title" id="overlayTitle">超级俄罗斯方块</div>
      <div class="overlay-score" id="overlayScore"></div>
      <button class="btn btn-large" id="overlayBtn">开始游戏</button>
    </div>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
